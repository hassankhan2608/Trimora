services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trimora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trimora}
      POSTGRES_DB: ${POSTGRES_DB:-trimora}
    ports:
      - "5432:5432"
    volumes:
      - trimora_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trimora}"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["local-db"]

  api:
    build: ./api
    restart: unless-stopped
    environment:
      PORT: "8080"
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      DATABASE_URL: ${DATABASE_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  trimora_db:
